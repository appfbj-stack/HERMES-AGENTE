services:
  db:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'

  redis:
    image: 'redis:7-alpine'

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - '8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.meuchat.fbautomacao.space}
    depends_on:
      - backend
    expose:
      - '80'

volumes:
  postgres_data:
