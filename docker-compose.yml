services:
  db:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    networks:
      - coolify

  redis:
    image: 'redis:7-alpine'
    networks:
      - coolify

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-hermes-bootstrap}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://openrouter.ai/api/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek/deepseek-chat}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_API_KEY_HEADER: ${EVOLUTION_API_KEY_HEADER:-apikey}
      HERMES_AGENT_URL: ${HERMES_AGENT_URL:-https://apihermes.fbautomacao.space}
      HERMES_AGENT_PATH: ${HERMES_AGENT_PATH:-/chat}
      HERMES_AGENT_API_KEY: ${HERMES_AGENT_API_KEY:-}
      TELEGRAM_BOT_TOKEN: "8793872667:AAG0XnR_zFXU5aczpPh_lV-Zt2DWEWtDshY"
      HERMES_MASTER_BOT_TOKEN: ${HERMES_MASTER_BOT_TOKEN:-8793872667:AAG0XnR_zFXU5aczpPh_lV-Zt2DWEWtDshY}
      HERMES_MASTER_BOT_USERNAME: ${HERMES_MASTER_BOT_USERNAME:-janejf_bot}
      PUBLIC_PANEL_URL: ${PUBLIC_PANEL_URL:-https://meuchat.fbautomacao.space}
      # Limites anti-prejuízo
      MAX_INPUT_CHARS: ${MAX_INPUT_CHARS:-800}
      MAX_OUTPUT_TOKENS: ${MAX_OUTPUT_TOKENS:-500}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-12}
      MAX_CONTEXT_CHARS_PER_MESSAGE: ${MAX_CONTEXT_CHARS_PER_MESSAGE:-600}
      # Asaas (cole sua API key no Coolify)
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_API_URL: ${ASAAS_API_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      ASAAS_OVERDUE_GRACE_DAYS: ${ASAAS_OVERDUE_GRACE_DAYS:-7}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: '["https://meuchat.fbautomacao.space","https://api.meuchat.fbautomacao.space"]'
    depends_on:
      - db
      - redis
    expose:
      - '8000'
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-backend.rule=Host(`api.meuchat.fbautomacao.space`)"
      - "traefik.http.routers.hermes-backend.entrypoints=https"
      - "traefik.http.routers.hermes-backend.tls=true"
      - "traefik.http.routers.hermes-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.meuchat.fbautomacao.space}
    depends_on:
      - backend
    expose:
      - '80'
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-frontend.rule=Host(`meuchat.fbautomacao.space`)"
      - "traefik.http.routers.hermes-frontend.entrypoints=https"
      - "traefik.http.routers.hermes-frontend.tls=true"
      - "traefik.http.routers.hermes-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  coolify:
    external: true
